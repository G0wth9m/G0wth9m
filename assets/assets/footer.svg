<svg width="1200" height="160" viewBox="0 0 1200 160" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#2563eb"/>
<stop offset="50%" stop-color="#38bdf8"/>
<stop offset="100%" stop-color="#2563eb"/>
</linearGradient>

<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#020617"/>
<stop offset="100%" stop-color="#0f172a"/>
</linearGradient>

</defs>

<rect width="1200" height="160" fill="url(#bg)"/>

<path fill="url(#wave)" opacity="0.65">

<animate attributeName="d"

dur="10s"

repeatCount="indefinite"

values="

M0,80 C150,40 350,120 600,80 C850,40 1050,120 1200,80 L1200,160 L0,160 Z;

M0,90 C150,130 350,40 600,90 C850,130 1050,40 1200,90 L1200,160 L0,160 Z;

M0,80 C150,40 350,120 600,80 C850,40 1050,120 1200,80 L1200,160 L0,160 Z

"/>

</path>

<path fill="#38bdf8" opacity="0.18">

<animate attributeName="d"

dur="8s"

repeatCount="indefinite"

values="

M0,105 C250,60 450,130 650,90 C900,60 1100,130 1200,100 L1200,160 L0,160 Z;

M0,95 C250,130 450,60 650,110 C900,130 1100,60 1200,90 L1200,160 L0,160 Z;

M0,105 C250,60 450,130 650,90 C900,60 1100,130 1200,100 L1200,160 L0,160 Z

"/>

</path>

<circle cx="150" cy="35" r="2" fill="#38bdf8">
<animate attributeName="cy" values="35;65;35" dur="5s" repeatCount="indefinite"/>
</circle>

<circle cx="350" cy="60" r="2.5" fill="#60a5fa">
<animate attributeName="cy" values="60;25;60" dur="7s" repeatCount="indefinite"/>
</circle>

<circle cx="600" cy="30" r="2" fill="#93c5fd">
<animate attributeName="cy" values="30;70;30" dur="6s" repeatCount="indefinite"/>
</circle>

<circle cx="850" cy="60" r="2.5" fill="#38bdf8">
<animate attributeName="cy" values="60;25;60" dur="7s" repeatCount="indefinite"/>
</circle>

<circle cx="1050" cy="35" r="2" fill="#60a5fa">
<animate attributeName="cy" values="35;70;35" dur="6s" repeatCount="indefinite"/>
</circle>

<text
x="600"
y="60"
text-anchor="middle"
font-family="Segoe UI"
font-size="20"
font-weight="600"
fill="#ffffff">

Thanks for visiting my profile ⭐

</text>

<text
x="600"
y="90"
text-anchor="middle"
font-family="Segoe UI"
font-size="15"
fill="#cbd5e1">

Building intelligent solutions through data

</text>

</svg>
