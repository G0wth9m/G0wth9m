<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#020617">
<animate attributeName="stop-color"
values="#020617;#0f172a;#1e3a8a;#020617"
dur="12s"
repeatCount="indefinite"/>
</stop>

<stop offset="100%" stop-color="#2563eb">
<animate attributeName="stop-color"
values="#2563eb;#38bdf8;#2563eb"
dur="12s"
repeatCount="indefinite"/>
</stop>
</linearGradient>

<linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#38bdf8"/>
<stop offset="50%" stop-color="#60a5fa"/>
<stop offset="100%" stop-color="#38bdf8"/>
</linearGradient>

<filter id="glow">
<feGaussianBlur stdDeviation="4" result="coloredBlur"/>
<feMerge>
<feMergeNode in="coloredBlur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>

</defs>

<rect width="1200" height="320" fill="url(#bg)"/>

<!-- Animated Grid -->

<g opacity="0.12">

<path d="M0 40 H1200">
<animate attributeName="opacity"
values="0.15;0.4;0.15"
dur="5s"
repeatCount="indefinite"/>
</path>

<path d="M0 80 H1200"/>
<path d="M0 120 H1200"/>
<path d="M0 160 H1200"/>
<path d="M0 200 H1200"/>
<path d="M0 240 H1200"/>
<path d="M0 280 H1200"/>

<path d="M100 0 V320"/>
<path d="M200 0 V320"/>
<path d="M300 0 V320"/>
<path d="M400 0 V320"/>
<path d="M500 0 V320"/>
<path d="M600 0 V320"/>
<path d="M700 0 V320"/>
<path d="M800 0 V320"/>
<path d="M900 0 V320"/>
<path d="M1000 0 V320"/>
<path d="M1100 0 V320"/>

</g>

<g stroke="url(#line)" stroke-width="0.5" opacity="0.18">

<path d="M0 40 H1200"/>
<path d="M0 80 H1200"/>
<path d="M0 120 H1200"/>
<path d="M0 160 H1200"/>
<path d="M0 200 H1200"/>
<path d="M0 240 H1200"/>
<path d="M0 280 H1200"/>

<path d="M100 0 V320"/>
<path d="M200 0 V320"/>
<path d="M300 0 V320"/>
<path d="M400 0 V320"/>
<path d="M500 0 V320"/>
<path d="M600 0 V320"/>
<path d="M700 0 V320"/>
<path d="M800 0 V320"/>
<path d="M900 0 V320"/>
<path d="M1000 0 V320"/>
<path d="M1100 0 V320"/>

</g>

<!-- Floating Particles -->

<circle cx="120" cy="60" r="3" fill="#38bdf8">
<animate attributeName="cy"
values="60;250;60"
dur="8s"
repeatCount="indefinite"/>
</circle>

<circle cx="260" cy="260" r="2" fill="#60a5fa">
<animate attributeName="cy"
values="260;70;260"
dur="7s"
repeatCount="indefinite"/>
</circle>

<circle cx="470" cy="80" r="2.5" fill="#93c5fd">
<animate attributeName="cy"
values="80;270;80"
dur="6s"
repeatCount="indefinite"/>
</circle>

<circle cx="820" cy="250" r="3" fill="#38bdf8">
<animate attributeName="cy"
values="250;70;250"
dur="8s"
repeatCount="indefinite"/>
</circle>

<circle cx="1030" cy="60" r="2.5" fill="#60a5fa">
<animate attributeName="cy"
values="60;270;60"
dur="6s"
repeatCount="indefinite"/>
</circle>

<circle cx="1120" cy="220" r="3" fill="#38bdf8">
<animate attributeName="cy"
values="220;80;220"
dur="9s"
repeatCount="indefinite"/>
</circle>
<!-- AI Network -->

<g stroke="#38bdf8" stroke-width="1" opacity="0.35">

<line x1="160" y1="120" x2="260" y2="90"/>
<line x1="260" y1="90" x2="340" y2="150"/>
<line x1="340" y1="150" x2="420" y2="100"/>
<line x1="420" y1="100" x2="510" y2="170"/>

<line x1="690" y1="170" x2="780" y2="100"/>
<line x1="780" y1="100" x2="860" y2="160"/>
<line x1="860" y1="160" x2="960" y2="110"/>
<line x1="960" y1="110" x2="1040" y2="170"/>

</g>

<!-- Data Nodes -->

<g>

<circle cx="160" cy="120" r="5" fill="#38bdf8">
<animate attributeName="r"
values="4;7;4"
dur="2s"
repeatCount="indefinite"/>
</circle>

<circle cx="260" cy="90" r="5" fill="#60a5fa">
<animate attributeName="r"
values="5;8;5"
dur="3s"
repeatCount="indefinite"/>
</circle>

<circle cx="340" cy="150" r="5" fill="#38bdf8">
<animate attributeName="r"
values="4;7;4"
dur="2.5s"
repeatCount="indefinite"/>
</circle>

<circle cx="420" cy="100" r="5" fill="#60a5fa">
<animate attributeName="r"
values="5;8;5"
dur="3s"
repeatCount="indefinite"/>
</circle>

<circle cx="510" cy="170" r="5" fill="#38bdf8">
<animate attributeName="r"
values="4;7;4"
dur="2s"
repeatCount="indefinite"/>
</circle>

<circle cx="690" cy="170" r="5" fill="#38bdf8">
<animate attributeName="r"
values="4;7;4"
dur="2s"
repeatCount="indefinite"/>
</circle>

<circle cx="780" cy="100" r="5" fill="#60a5fa">
<animate attributeName="r"
values="5;8;5"
dur="3s"
repeatCount="indefinite"/>
</circle>

<circle cx="860" cy="160" r="5" fill="#38bdf8">
<animate attributeName="r"
values="4;7;4"
dur="2.5s"
repeatCount="indefinite"/>
</circle>

<circle cx="960" cy="110" r="5" fill="#60a5fa">
<animate attributeName="r"
values="5;8;5"
dur="3s"
repeatCount="indefinite"/>
</circle>

<circle cx="1040" cy="170" r="5" fill="#38bdf8">
<animate attributeName="r"
values="4;7;4"
dur="2s"
repeatCount="indefinite"/>
</circle>

</g>

<!-- Rotating AI Ring -->

<g transform="translate(600 155)">

<circle
cx="0"
cy="0"
r="55"
stroke="#38bdf8"
stroke-width="2"
fill="none"
opacity="0.5"/>

<circle
cx="0"
cy="0"
r="42"
stroke="#60a5fa"
stroke-width="1.5"
fill="none"
opacity="0.6"/>

<g>

<animateTransform
attributeName="transform"
attributeType="XML"
type="rotate"
from="0"
to="360"
dur="12s"
repeatCount="indefinite"/>

<circle cx="55" cy="0" r="5" fill="#38bdf8"/>
<circle cx="-55" cy="0" r="5" fill="#60a5fa"/>
<circle cx="0" cy="-55" r="5" fill="#93c5fd"/>
<circle cx="0" cy="55" r="5" fill="#38bdf8"/>

</g>

</g>

  <!-- Main Name -->

<text
x="600"
y="115"
font-family="Segoe UI"
font-size="54"
font-weight="700"
fill="#ffffff"
text-anchor="middle"
filter="url(#glow)">

GOWTHAM S

</text>

<!-- Subtitle -->

<text
x="600"
y="155"
font-family="Segoe UI"
font-size="24"
fill="#38bdf8"
text-anchor="middle">

Data Analytics • Data Science • Machine Learning

</text>

<!-- Skills -->

<text
x="600"
y="190"
font-family="Segoe UI"
font-size="18"
fill="#d1d5db"
text-anchor="middle">

Python • Power BI • SQL • Data Visualization

</text>

<!-- Animated Underline -->

<line
x1="360"
y1="215"
x2="840"
y2="215"
stroke="#38bdf8"
stroke-width="2">

<animate
attributeName="x2"
values="360;840;360"
dur="5s"
repeatCount="indefinite"/>

</line>

<!-- Tagline -->

<text
x="600"
y="250"
font-family="Segoe UI"
font-size="18"
fill="#ffffff"
text-anchor="middle">

Building Intelligent Solutions Through Data

</text>

<!-- Bottom Glow -->

<rect
x="0"
y="312"
width="1200"
height="8"
fill="#38bdf8"
opacity="0.35">

<animate
attributeName="opacity"
values="0.15;0.8;0.15"
dur="3s"
repeatCount="indefinite"/>

</rect>

<!-- Corner Glow -->

<circle cx="40" cy="40" r="90" fill="#2563eb" opacity="0.08">
<animate attributeName="opacity"
values="0.04;0.15;0.04"
dur="6s"
repeatCount="indefinite"/>
</circle>

<circle cx="1160" cy="280" r="90" fill="#38bdf8" opacity="0.08">
<animate attributeName="opacity"
values="0.04;0.15;0.04"
dur="6s"
repeatCount="indefinite"/>
</circle>

</svg>
