<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#020617">
<animate attributeName="stop-color"
values="#020617;#0f172a;#1e3a8a;#020617"
dur="12s"
repeatCount="indefinite"/>
</stop>

<stop offset="100%" stop-color="#2563eb">
<animate attributeName="stop-color"
values="#2563eb;#38bdf8;#2563eb"
dur="12s"
repeatCount="indefinite"/>
</stop>
</linearGradient>

<linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#38bdf8"/>
<stop offset="50%" stop-color="#60a5fa"/>
<stop offset="100%" stop-color="#38bdf8"/>
</linearGradient>

<filter id="glow">
<feGaussianBlur stdDeviation="4" result="coloredBlur"/>
<feMerge>
<feMergeNode in="coloredBlur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>

</defs>

<rect width="1200" height="320" fill="url(#bg)"/>

<!-- Animated Grid -->

<g opacity="0.12">

<path d="M0 40 H1200">
<animate attributeName="opacity"
values="0.15;0.4;0.15"
dur="5s"
repeatCount="indefinite"/>
</path>

<path d="M0 80 H1200"/>
<path d="M0 120 H1200"/>
<path d="M0 160 H1200"/>
<path d="M0 200 H1200"/>
<path d="M0 240 H1200"/>
<path d="M0 280 H1200"/>

<path d="M100 0 V320"/>
<path d="M200 0 V320"/>
<path d="M300 0 V320"/>
<path d="M400 0 V320"/>
<path d="M500 0 V320"/>
<path d="M600 0 V320"/>
<path d="M700 0 V320"/>
<path d="M800 0 V320"/>
<path d="M900 0 V320"/>
<path d="M1000 0 V320"/>
<path d="M1100 0 V320"/>

</g>

<g stroke="url(#line)" stroke-width="0.5" opacity="0.18">

<path d="M0 40 H1200"/>
<path d="M0 80 H1200"/>
<path d="M0 120 H1200"/>
<path d="M0 160 H1200"/>
<path d="M0 200 H1200"/>
<path d="M0 240 H1200"/>
<path d="M0 280 H1200"/>

<path d="M100 0 V320"/>
<path d="M200 0 V320"/>
<path d="M300 0 V320"/>
<path d="M400 0 V320"/>
<path d="M500 0 V320"/>
<path d="M600 0 V320"/>
<path d="M700 0 V320"/>
<path d="M800 0 V320"/>
<path d="M900 0 V320"/>
<path d="M1000 0 V320"/>
<path d="M1100 0 V320"/>

</g>

<!-- Floating Particles -->

<circle cx="120" cy="60" r="3" fill="#38bdf8">
<animate attributeName="cy"
values="60;250;60"
dur="8s"
repeatCount="indefinite"/>
</circle>

<circle cx="260" cy="260" r="2" fill="#60a5fa">
<animate attributeName="cy"
values="260;70;260"
dur="7s"
repeatCount="indefinite"/>
</circle>

<circle cx="470" cy="80" r="2.5" fill="#93c5fd">
<animate attributeName="cy"
values="80;270;80"
dur="6s"
repeatCount="indefinite"/>
</circle>

<circle cx="820" cy="250" r="3" fill="#38bdf8">
<animate attributeName="cy"
values="250;70;250"
dur="8s"
repeatCount="indefinite"/>
</circle>

<circle cx="1030" cy="60" r="2.5" fill="#60a5fa">
<animate attributeName="cy"
values="60;270;60"
dur="6s"
repeatCount="indefinite"/>
</circle>

<circle cx="1120" cy="220" r="3" fill="#38bdf8">
<animate attributeName="cy"
values="220;80;220"
dur="9s"
repeatCount="indefinite"/>
</circle>
